<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Post - Cafe & Teabag</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #c5a059;
            --gold-light: #e2c275;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; background: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .post-card {
            width: 1080px;
            height: 1080px;
            background-image: linear-gradient(to bottom, rgba(10, 25, 47, 0.4), rgba(10, 25, 47, 0.95)),
                              url('assets/ad_cafe.png');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            color: var(--white);
        }

        .content {
            padding: 80px 100px;
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header-section {
            text-align: center;
        }

        .brand-name { font-size: 1.5rem; font-weight: 800; color: var(--gold); letter-spacing: 6px; margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .main-title { font-size: 5rem; font-weight: 800; margin-bottom: 10px; color: var(--white); text-shadow: 0 4px 20px rgba(0,0,0,0.6); line-height: 1.2; }
        .sub-title { font-size: 2.2rem; color: var(--gold-light); font-weight: 400; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* Product Image - Centered and Floating */
        .product-area {
            position: relative;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .product-img {
            width: 500px;
            filter: drop-shadow(0 40px 60px rgba(0,0,0,0.8));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .features-row {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 20px;
        }
        .f-item { text-align: center; }
        .f-item i { font-size: 3rem; color: var(--gold); margin-bottom: 15px; display: block; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }
        .f-item span { font-size: 1.3rem; font-weight: 600; text-shadow: 0 2px 5px rgba(0,0,0,0.8); }

        .footer-cta {
            background: var(--gold);
            color: var(--navy);
            padding: 25px 80px;
            border-radius: 100px;
            align-self: center;
            font-size: 2rem;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="post-card">
        <div class="content">
            <div class="header-section">
                <div class="brand-name">BIOREVIVE LAB</div>
                <h1 class="main-title">จบปัญหากลิ่นหลังบาร์</h1>
                <p class="sub-title">ด้วยนวัตกรรมแบบ "ซองชา" ใช้ง่าย ดูพรีเมียม</p>
            </div>

            <div class="product-area">
                <img src="assets/product_teabag_nobg.png" class="product-img" alt="BioRevive Teabag">
            </div>

            <div class="features-row">
                <div class="f-item">
                    <i class="fa-solid fa-mug-hot"></i>
                    <span>เหมาะกับคาเฟ่</span>
                </div>
                <div class="f-item">
                    <i class="fa-solid fa-sink"></i>
                    <span>อ่างล้างแก้ว/จาน</span>
                </div>
                <div class="f-item">
                    <i class="fa-solid fa-wind"></i>
                    <span>ดับกลิ่นตีกลับ</span>
                </div>
            </div>

            <a href="#" class="footer-cta">
                ปรึกษาผู้เชี่ยวชาญ ฟรี <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
    </div>
</body>
</html>
