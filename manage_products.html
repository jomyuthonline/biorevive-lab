<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการฐานข้อมูลสินค้า (API) - BioRevive Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .api-container { max-width: 900px; margin: 2rem auto; padding: 2rem; background: var(--card-bg, #1a1a2e); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .product-list { margin-top: 1.5rem; display: grid; gap: 1rem; }
        .product-card { padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .product-info h4 { margin: 0 0 0.5rem 0; color: #fff; }
        .product-info p { margin: 0; color: #aaa; font-size: 0.9rem; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .btn-delete:hover { background: #c0392b; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #ccc; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 6px; }
        .btn-submit { background: #06C755; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-submit:hover { background: #05a044; }
    </style>
</head>
<body style="background: #0f0f1a; color: #fff; font-family: 'Noto Sans Thai', sans-serif;">
    <div class="app-container">
        <header>
            <div class="logo-area">
                <span class="brand">BIOREVIVE</span>
                <span class="tagline">DATABASE MANAGER</span>
            </div>
            <a href="dashboard.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> กลับสู่หน้าหลัก</a>
        </header>

        <main>
            <section class="api-container">
                <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-server"></i> จัดการข้อมูลสินค้าในระบบ (API)</h2>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <!-- Form for Add/Update -->
                    <div>
                        <h3>เพิ่มสินค้าใหม่</h3>
                        <form id="product-form" style="margin-top: 1rem;">
                            <div class="form-group">
                                <label>ชื่อสินค้า</label>
                                <input type="text" id="p-name" required placeholder="เช่น Live Microbe Liquid">
                            </div>
                            <div class="form-group">
                                <label>หมวดหมู่</label>
                                <select id="p-category">
                                    <option value="liquid">สูตรน้ำ (Liquid)</option>
                                    <option value="premium">สูตรพรีเมียม (Premium Powder)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>อัตราส่วนการใช้ (Dosage Rate)</label>
                                <input type="number" id="p-rate" step="0.01" required placeholder="เช่น 0.1">
                            </div>
                            <div class="form-group">
                                <label>หน่วย (Unit)</label>
                                <input type="text" id="p-unit" required placeholder="เช่น ลิตร (L) หรือ กิโลกรัม (kg)">
                            </div>
                            <button type="submit" class="btn-submit"><i class="fa-solid fa-save"></i> บันทึกข้อมูลลงฐานข้อมูล</button>
                        </form>
                        <p id="form-msg" style="margin-top: 1rem; color: #06C755; display: none;">บันทึกสำเร็จ!</p>
                    </div>

                    <!-- List of Products -->
                    <div>
                        <h3>รายการสินค้าในระบบ <button id="btn-refresh" style="background:none; border:none; color: #06C755; cursor: pointer;"><i class="fa-solid fa-sync"></i></button></h3>
                        <div id="product-list" class="product-list">
                            <p style="color: #666;">กำลังโหลดข้อมูลจาก API...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="manage_products.js"></script>
</body>
</html>
