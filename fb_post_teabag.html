<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Post - Teabag Ease</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #c5a059;
            --gold-light: #e2c275;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; background: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .post-card {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            color: var(--white);
        }

        /* Modern Abstract Shapes */
        .shape {
            position: absolute;
            background: rgba(197, 160, 89, 0.1);
            border-radius: 50%;
        }
        .s1 { width: 800px; height: 800px; top: -400px; left: -200px; }
        .s2 { width: 400px; height: 400px; bottom: -100px; right: -100px; border: 2px solid var(--gold); }

        .content {
            padding: 100px;
            position: relative;
            z-index: 2;
            height: 100%;
            text-align: center;
        }

        .brand-name { font-size: 1.5rem; font-weight: 800; color: var(--gold); letter-spacing: 6px; margin-bottom: 40px; }
        .main-title { font-size: 5.5rem; font-weight: 800; margin-bottom: 10px; color: var(--white); }
        .sub-title { font-size: 2.5rem; color: var(--gold-light); margin-bottom: 60px; font-weight: 400; }

        /* Product Image - Centered and Floating */
        .product-area {
            position: relative;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
        }
        .product-img {
            width: 550px;
            filter: drop-shadow(0 40px 60px rgba(0,0,0,0.6));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .features-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
        }
        .f-item { text-align: center; }
        .f-item i { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; display: block; }
        .f-item span { font-size: 1.2rem; font-weight: 600; }

        .footer-cta {
            background: var(--gold);
            color: var(--navy);
            padding: 30px 60px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            font-size: 2rem;
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="post-card">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        
        <div class="content">
            <div class="brand-name">BIOREVIVE LAB</div>
            <h1 class="main-title">แค่หย่อน..ก็จบ</h1>
            <p class="sub-title">รุ่น "ซองชา" ใช้ง่าย ไม่ต้องตวง ไม่เลอะมือ</p>

            <div class="product-area">
                <img src="assets/product_teabag_nobg.png" class="product-img" alt="BioRevive Teabag">
            </div>

            <div class="features-row">
                <div class="f-item">
                    <i class="fa-solid fa-sink"></i>
                    <span>อ่างล้างจาน</span>
                </div>
                <div class="f-item">
                    <i class="fa-solid fa-toilet"></i>
                    <span>ชักโครก</span>
                </div>
                <div class="f-item">
                    <i class="fa-solid fa-shower"></i>
                    <span>ท่อระบายน้ำ</span>
                </div>
                <div class="f-item">
                    <i class="fa-solid fa-wind"></i>
                    <span>กำจัดกลิ่น</span>
                </div>
            </div>

            <a href="#" class="footer-cta">
                สั่งซื้อเลย <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
    </div>
</body>
</html>
