<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Post - Biological Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0a192f;
            --gold: #c5a059;
            --gold-light: #e2c275;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', 'Noto Sans Thai', sans-serif; background: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .post-card {
            width: 1080px;
            height: 1080px;
            background: var(--navy);
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            color: var(--white);
        }

        /* Decorative Elements */
        .post-card::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Content Area */
        .content {
            padding: 80px;
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header { border-left: 8px solid var(--gold); padding-left: 30px; }
        .brand-name { font-size: 2rem; font-weight: 800; color: var(--gold); letter-spacing: 4px; margin-bottom: 10px; }
        .main-title { font-size: 5rem; line-height: 1.1; font-weight: 800; margin-bottom: 20px; }
        .sub-title { font-size: 1.8rem; color: var(--gold-light); font-weight: 400; }

        /* Product Image */
        .product-container {
            position: absolute;
            bottom: 50px;
            right: -20px;
            width: 700px;
            z-index: 3;
        }
        .product-img {
            width: 100%;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.8));
            transform: rotate(-5deg);
        }

        /* Highlight Boxes */
        .highlights { margin-top: 50px; display: flex; flex-direction: column; gap: 20px; }
        .item { display: flex; align-items: center; gap: 20px; font-size: 1.5rem; background: rgba(255,255,255,0.05); padding: 20px 40px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); width: fit-content; }
        .item i { color: var(--gold); }

        .cta-area { display: flex; align-items: center; gap: 40px; }
        .price-tag { font-size: 3rem; font-weight: 800; color: var(--white); }
        .price-tag span { font-size: 1.5rem; color: var(--gold); vertical-align: middle; }
        .qr-code { width: 120px; height: 120px; background: white; padding: 10px; border-radius: 15px; }

        .badge-exclusive {
            position: absolute;
            top: 80px;
            right: 80px;
            background: var(--gold);
            color: var(--navy);
            padding: 15px 30px;
            font-weight: 800;
            font-size: 1.2rem;
            border-radius: 50px;
            transform: rotate(15deg);
        }
    </style>
</head>
<body>
    <div class="post-card">
        <div class="badge-exclusive">BEST SELLER</div>
        
        <div class="content">
            <div class="header">
                <div class="brand-name">BIOREVIVE LAB</div>
                <h1 class="main-title">หยุดกลิ่นเหม็น<br>ย่อยไขมันสะสม</h1>
                <p class="sub-title">นวัตกรรมจุลินทรีย์เชื้อสดเข้มข้น มาตรฐาน BCG</p>
            </div>

            <div class="highlights">
                <div class="item"><i class="fa-solid fa-circle-check"></i> ย่อยไขมันในบ่อดักและท่อระบายน้ำ</div>
                <div class="item"><i class="fa-solid fa-circle-check"></i> กำจัดกลิ่นเน่าเสียเห็นผลใน 24 ชม.</div>
                <div class="item"><i class="fa-solid fa-circle-check"></i> ปลอดภัย 100% ต่อคนและสิ่งแวดล้อม</div>
            </div>

            <div class="cta-area">
                <div class="price-tag"><span>เริ่มต้นที่</span> 350.-</div>
                <img src="assets/qrcode_biorevive.png" class="qr-code" alt="QR Code">
                <div style="font-size: 1.2rem; color: var(--gold-light);">สแกนสั่งซื้อหรือ<br>ปรึกษาผู้เชี่ยวชาญ</div>
            </div>
        </div>

        <div class="product-container">
            <!-- Using the real product image -->
            <img src="assets/product_soil1kg.jpg" class="product-img" alt="BioRevive 1kg Bag">
        </div>
    </div>
</body>
</html>
